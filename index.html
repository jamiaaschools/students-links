<!DOCTYPE html>

        body {

            text-align: center;
            background: linear-gradient(to bottom, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            color: #fff;
        }

        .container {
            margin-top: 50px;
        }

        img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        h1 {
            margin-bottom: 5px;
        }

        p {
            color: #e0e0e0;
        }

        .link {
            display: block;
            margin: 15px auto;
            padding: 15px;
            width: 80%;

            background: #ffffff;
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            transition: 0.3s;
        }

        .link:hover {
            background: #ddd;
            transform: scale(1.03);
        }
    </style>
</head>
