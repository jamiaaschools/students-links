<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مدارس الجامعة الاولى</title>

<!-- خط عربي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Cairo', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #4facfe, #00c6ff);
        margin: 0;
        color: #fff;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 30px;
        width: 90%;
        max-width: 420px;
        margin: 80px auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img {
        width: 110px;
        border-radius: 50%;
        border: 3px solid #fff;
        margin-bottom: 15px;
    }

    h1 {
        margin: 10px 0;
        font-size: 24px;
    }

    p {
        color: #e0e0e0;
        margin-bottom: 25px;
    }

    .link {
        display: block;
        margin: 12px auto;
        padding: 14px;
        width: 100%;
        background: linear-gradient(135deg, #ffffff, #f1f1f1);
        color: #333;
        text-decoration: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: 0.3s;
    }

    .link:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        background: #fff;
    }
</style>
</head>

<body>

<div class="card">

    <a href="https://jsg.edu.jo" target="_blank">
        <img src="a.png">
    </a>

    <h1>طالبات الصف التاسع بنات</h1>
    <p>مدارس الجامعة الأولى بنات</p>

    <a class="link" href="https://www.vevojob.com/" target="_blank">
        اختبار الميول المهنية
    </a>

</div>

</body>
</html>
